<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <h1 class="brand">ToDo List</h1>
    </div>
  </header>

  <main class="page-main">
    <section class="todo-section container" aria-labelledby="todo-title">
      <h2 id="todo-title" class="todo-title">ToDo List</h2>

      <form class="todo-form" id="todo-form">
        <label for="task-input" class="visually-hidden">Enter a new task</label>
        <input
          id="task-input"
          class="task-input"
          type="text"
          name="task"
          placeholder="New Task"
          autocomplete="off"
          required
        />
        <button class="add-button" type="submit">Add</button>
      </form>

      <ul class="todo-list" id="todo-list" aria-label="Task list">
        <li class="todo-item">
          <div class="todo-left">
            <input
              class="task-checkbox"
              type="checkbox"
              id="task-1"
              checked
            />
            <label class="task-text task-text-done" for="task-1">First item</label>
          </div>
          <button class="delete-button" type="button" aria-label="Delete First item">
            Delete
          </button>
        </li>

        <li class="todo-item">
          <div class="todo-left">
            <input
              class="task-checkbox"
              type="checkbox"
              id="task-2"
            />
            <label class="task-text" for="task-2">Second item</label>
          </div>
          <button class="delete-button" type="button" aria-label="Delete Second item">
            Delete
          </button>
        </li>

        <li class="todo-item">
          <div class="todo-left">
            <input
              class="task-checkbox"
              type="checkbox"
              id="task-3"
            />
            <label class="task-text" for="task-3">Third item</label>
          </div>
          <button class="delete-button" type="button" aria-label="Delete Third item">
            Delete
          </button>
        </li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
