<div class="card">
  <img class="product-image" [src]="product().image" [alt]="product().name" />

  <div class="card-body">
    <h3 class="product-title">
      <a [href]="product().link" target="_blank">{{ product().name }}</a>
    </h3>

    <p class="description">{{ product().description }}</p>

    <p class="meta"><strong>Price:</strong> {{ product().price }} ₸</p>
    <p class="meta"><strong>Rating:</strong> {{ product().rating }}</p>
    <p class="likes">❤ {{ product().likes }}</p>

    <div class="actions">
      <button class="btn like-btn" (click)="likeProduct()">Like</button>
      <button class="btn share-btn" (click)="shareWhatsApp()">WhatsApp</button>
      <button class="btn share-btn" (click)="shareTelegram()">Telegram</button>
      <button class="btn delete-btn" (click)="removeProduct()">Delete</button>
    </div>
  </div>
</div>
