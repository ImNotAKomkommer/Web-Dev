@if (renderedProducts.length > 0) {
  <div class="product-grid">
    @for (product of renderedProducts; track product.id) {
      <app-product-item
        [product]="product"
        (deleteProduct)="onDeleteProduct($event)"
      ></app-product-item>
    }
  </div>
} @else {
  <p class="empty-message">No products in this category.</p>
}
